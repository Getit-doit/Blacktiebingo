<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Roll Controls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="control">
    <div class="stage-lights stage-lights-left"></div>
    <div class="stage-lights stage-lights-right"></div>

    <main class="app-shell app-shell-control">
      <section class="control-panel control-panel-standalone">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Control Page</p>
            <h2>Call next number</h2>
          </div>
          <button class="ghost-button" id="resetButton" type="button">Reset</button>
        </div>

        <form class="manual-call-form" id="manualCallForm">
          <label>
            Letter
            <select id="letterSelect" aria-label="Bingo letter">
              <option value="B">B</option>
              <option value="I">I</option>
              <option value="N">N</option>
              <option value="G">G</option>
              <option value="O">O</option>
            </select>
          </label>

          <label>
            Number
            <input
              id="numberInput"
              type="number"
              min="1"
              max="75"
              placeholder="1-75"
              inputmode="numeric"
            />
          </label>

          <button class="gold-button" type="submit">Call Number</button>
        </form>

        <p class="status-message" id="statusMessage" aria-live="polite">
          Ready for the next call.
        </p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
