<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Roll Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="stage-lights stage-lights-left"></div>
    <div class="stage-lights stage-lights-right"></div>

    <main class="app-shell">
      <section class="hero-panel">
        <div class="hero-copy">
          <h1>Black Tie Bingo</h1>
        </div>

        <div class="hero-showcase">
          <div class="logo-card">
            <img
              class="hero-logo"
              src="./MightyNinetyModern.svg"
              alt="Black Tie Bingo logo"
            />
          </div>

          <div class="current-call-card" id="callCard">
            <div class="bingo-ball-stage">
              <div class="bingo-ball">
                <div class="ball-shine"></div>
                <div class="ball-core">
                  <div class="call-letter" id="currentLetter">?</div>
                  <div class="call-number" id="currentNumber">--</div>
                </div>
              </div>
            </div>
            <div class="sparkle-ring sparkle-ring-one"></div>
            <div class="sparkle-ring sparkle-ring-two"></div>
          </div>
        </div>
      </section>

      <section class="board-panel">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Full Board</p>
            <h2>All called numbers</h2>
          </div>
        </div>
        <div class="board-grid" id="boardGrid"></div>
      </section>

      <section class="control-bar">
        <form class="manual-call-form manual-call-form-compact" id="manualCallForm">
          <label>
            Letter
            <select id="letterSelect" aria-label="Bingo letter">
              <option value="B">B</option>
              <option value="I">I</option>
              <option value="N">N</option>
              <option value="G">G</option>
              <option value="O">O</option>
            </select>
          </label>

          <label>
            Number
            <input
              id="numberInput"
              type="number"
              min="1"
              max="75"
              placeholder="1-75"
              inputmode="numeric"
            />
          </label>

          <button class="gold-button" type="submit">Call Number</button>
          <button class="ghost-button" id="resetButton" type="button">Reset</button>
        </form>

        <p class="status-message" id="statusMessage" aria-live="polite">
          Ready for the next call.
        </p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
